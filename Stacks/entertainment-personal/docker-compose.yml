services:
  entertainment:
    container_name: skeleton-entertainment
    image: alpine:latest
    restart: unless-stopped
    environment:
      - TZ=${TZ:-UTC}
    command: >
      sh -c 'while true; do
        echo "[$$( date )] Heartbeat — entertainment-personal stack is alive";
        sleep 60;
      done'
    healthcheck:
      test: ["CMD", "true"]
      interval: 30s
      timeout: 5s
      retries: 3
