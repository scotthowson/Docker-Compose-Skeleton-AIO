services:
  redis:
    container_name: skeleton-redis
    image: redis:alpine
    restart: unless-stopped
    environment:
      - TZ=${TZ:-UTC}
    volumes:
      - ${APP_DATA_DIR:-./App-Data}/Redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  dcs-ui:
    container_name: DCS-UI
    image: ghcr.io/scotthowson/docker-compose-skeleton-ui:latest
    # To build locally instead of pulling from GHCR, uncomment below:
    # build:
    #   context: ../../Docker-Compose-Skeleton-UI
    #   dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${DCS_UI_PORT:-3000}:3000"
    environment:
      - TZ=${TZ:-UTC}
      - DCS_API_HOST=host.docker.internal
      - DCS_API_PORT=${API_PORT:-9876}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - default
      - proxy
    # Security hardening
    read_only: true
    tmpfs:
      - /tmp
      - /var/cache/nginx
      - /run
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  proxy:
    name: proxy
    driver: bridge
