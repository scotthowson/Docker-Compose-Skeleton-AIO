services:
  docker-socket-proxy:
    container_name: Docker-Socket
    image: tecnativa/docker-socket-proxy:latest
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - CONTAINERS=1
      - SERVICES=1
      - TASKS=1
      - EXEC=1
      - EVENTS=1
      - INFO=1
      - NETWORKS=1
      - VOLUMES=1
      - POST=0
    ports:
      - "${HOST_PORT:-2375}:2375"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:2375/version"]
      interval: 30s
      timeout: 5s
      retries: 3
