debug: false
app_name: pelican
uuid: ""
token_id: ""
token: ""
api:
  host: 0.0.0.0
  port: 443
  ssl:
    enabled: false
    cert: ""
    key: ""
  disable_remote_download: false
  remote_download:
    max_redirects: 10
  upload_limit: 512
  trusted_proxies: []
system:
  root_directory: /var/lib/pelican
  log_directory: /var/log/pelican
  data: /srv/pelican/servers
  archive_directory: /var/lib/pelican/archives
  backup_directory: /var/lib/pelican/backups
  tmp_directory: /tmp/pelican
  username: pelican
  timezone: Etc/UTC
  user:
    rootless:
      enabled: false
      container_uid: 0
      container_gid: 0
    uid: 988
    gid: 988
    passwd:
      enable: true
      directory: /etc/pelican
    machine_id:
      enable: false
      directory: /etc/pelican/machine-id
  disk_check_interval: 150
  activity_send_interval: 60
  activity_send_count: 100
  check_permissions_on_boot: true
  enable_log_rotate: true
  websocket_log_count: 150
  sftp:
    bind_address: 0.0.0.0
    bind_port: 2022
    read_only: false
    key_only: false
  crash_detection:
    enabled: true
    detect_clean_exit_as_crash: true
    timeout: 60
  crash_detection_activity_lines: 2
  backups:
    write_limit: 0
    compression_level: best_speed
    remove_backups_on_server_delete: true
  transfers:
    download_limit: 0
  openat_mode: auto
docker:
  network:
    interface: 172.25.0.1
    dns:
    - 1.1.1.1
    - 1.0.0.1
    name: pelican_nw
    ispn: false
    IPv6: true
    driver: bridge
    network_mode: pelican_nw
    is_internal: false
    enable_icc: true
    network_mtu: 1500
    interfaces:
      v4:
        subnet: 172.25.0.0/16
        gateway: 172.25.0.1
      v6:
        subnet: fdba:17c8:6c94::/64
        gateway: fdba:17c8:6c94::1011
  domainname: ""
  registries: {}
  tmpfs_size: 100
  container_pid_limit: 512
  installer_limits:
    memory: 1024
    cpu: 100
  overhead:
    override: false
    default_multiplier: 1.05
    multipliers: {}
  use_performant_inspect: true
  userns_mode: ""
  system_ips: []
  log_config:
    type: local
    config:
      compress: "false"
      max-file: "1"
      max-size: 5m
      mode: non-blocking
throttles:
  enabled: true
  lines: 2000
  line_reset_interval: 100
remote: ""
remote_query:
  timeout: 30
  boot_servers_per_page: 50
  custom_headers: {}
allowed_mounts: []
Search:
  blacklisted_dirs:
  - node_modules
  - .wine
  - appcache
  - depotcache
  - vendor
  max_recursion_depth: 8
BlockBaseDirMount: true
allowed_origins: []
allow_cors_private_network: false
ignore_panel_config_updates: false
