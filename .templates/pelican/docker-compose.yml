services:
  pelican-panel:
    container_name: Pelican-Panel
    image: ghcr.io/pelican-dev/panel:latest
    restart: unless-stopped
    user: "0:0"
    ports:
      - "${PANEL_PORT_HTTP:-8005}:80"
      - "${PANEL_PORT_HTTPS:-8006}:443"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - default
      - proxy
    volumes:
      - ${APP_DATA_DIR:-./App-Data}/Pelican/Panel:/pelican-data
      - ${APP_DATA_DIR:-./App-Data}/Pelican/Panel/logs:/var/www/html/storage/logs
    environment:
      - TZ=${TZ:-UTC}
      - XDG_DATA_HOME=/pelican-data
      - APP_URL=${PANEL_APP_URL:-http://127.0.0.1:8005}
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_LOCALE=en
      - BEHIND_PROXY=${PANEL_BEHIND_PROXY:-true}
      - LE_EMAIL=${PANEL_ADMIN_EMAIL:-admin@example.com}
      - TRUSTED_PROXIES=${PANEL_TRUSTED_PROXIES:-0.0.0.0/0}
      - DB_CONNECTION=${PANEL_DB_CONNECTION:-sqlite}
      - DB_HOST=${PANEL_DB_HOST:-}
      - DB_PORT=${PANEL_DB_PORT:-3306}
      - DB_DATABASE=${PANEL_DB_NAME:-pelican}
      - DB_USERNAME=${PANEL_DB_USER:-pelican}
      - DB_PASSWORD=${PANEL_DB_PASSWORD:-}
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:80/up || curl -sf http://127.0.0.1:80/ || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 5
      start_period: 90s

  pelican-wings:
    container_name: Pelican-Wings
    image: ghcr.io/pelican-dev/wings:latest
    privileged: true
    restart: always
    ports:
      - "${WINGS_SFTP_PORT:-2024}:2022"
      - "${WINGS_PORT:-8444}:8080"
    environment:
      - TZ=${TZ:-UTC}
      - WINGS_UID=${WINGS_UID:-988}
      - WINGS_GID=${WINGS_GID:-988}
      - WINGS_USERNAME=${WINGS_USERNAME:-pelican-wings}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${PELICAN_SERVER_DIR:-/srv/pelican/servers}:${PELICAN_SERVER_DIR:-/srv/pelican/servers}
      - ${APP_DATA_DIR:-./App-Data}/Pelican/Wings/config:/etc/pelican
      - ${APP_DATA_DIR:-./App-Data}/Pelican/Wings/data:/var/lib/pelican
      - ${APP_DATA_DIR:-./App-Data}/Pelican/Wings/logs:/var/log/pelican
      - /etc/machine-id:/etc/machine-id:ro
      - /var/lib/dbus/machine-id:/var/lib/dbus/machine-id:ro
      - /tmp/pelican:/tmp/pelican
    depends_on:
      pelican-panel:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:8080/api/system || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

networks:
  proxy:
    external: true
