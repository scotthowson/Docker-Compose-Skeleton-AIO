services:
  mealie:
    container_name: Mealie
    image: ghcr.io/mealie-recipes/mealie:latest
    restart: unless-stopped
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-UTC}
      - ALLOW_SIGNUP=true
      - MAX_WORKERS=1
      - WEB_CONCURRENCY=1
    volumes:
      - ${APP_DATA_DIR:-./App-Data}/Mealie/data:/app/data
    ports:
      - "${PORT_MEALIE:-9925}:9000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:9000/api/app/about"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
