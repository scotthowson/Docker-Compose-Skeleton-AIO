services:
  flaresolverr:
    container_name: FlareSolverr
    image: ghcr.io/flaresolverr/flaresolverr:latest
    restart: unless-stopped
    environment:
      - TZ=${TZ:-UTC}
      - LOG_LEVEL=info
    ports:
      - "${PORT_FLARESOLVERR:-8191}:8191"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8191/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
