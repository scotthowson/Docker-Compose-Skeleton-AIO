services:
  seerr:
    container_name: Seerr
    image: ghcr.io/seerr-team/seerr:latest
    init: true
    restart: unless-stopped
    environment:
      - TZ=${TZ:-UTC}
      - PORT=5055
      - LOG_LEVEL=info
    volumes:
      - ${APP_DATA_DIR:-./App-Data}/Seerr/config:/app/config
    ports:
      - "${HOST_PORT:-5055}:5055"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:5055/api/v1/status || exit 1"]
      interval: 15s
      timeout: 3s
      retries: 3
      start_period: 20s
