services:
  seerr:
    container_name: Seerr
    image: ghcr.io/seerr-team/seerr:latest
    init: true
    restart: unless-stopped
    environment:
      - TZ=${TZ:-UTC}
      - LOG_LEVEL=info
    volumes:
      - ${APP_DATA_DIR:-./App-Data}/Seerr/config:/app/config
    ports:
      - "${PORT_SEERR:-5055}:5055"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:5055/api/v1/status"]
      interval: 15s
      timeout: 3s
      retries: 3
      start_period: 20s
