services:
  audiobookshelf:
    container_name: Audiobookshelf
    image: ghcr.io/advplyr/audiobookshelf:latest
    restart: unless-stopped
    environment:
      - TZ=${TZ:-UTC}
    volumes:
      - ${APP_DATA_DIR:-./App-Data}/Audiobookshelf/audiobooks:/audiobooks
      - ${APP_DATA_DIR:-./App-Data}/Audiobookshelf/podcasts:/podcasts
      - ${APP_DATA_DIR:-./App-Data}/Audiobookshelf/config:/config
      - ${APP_DATA_DIR:-./App-Data}/Audiobookshelf/metadata:/metadata
    ports:
      - "${PORT_AUDIOBOOKSHELF:-13378}:80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:80/healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
