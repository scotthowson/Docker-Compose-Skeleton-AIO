services:
  nextcloud-aio:
    container_name: nextcloud-aio-mastercontainer
    image: ghcr.io/nextcloud-releases/all-in-one:latest
    init: true
    restart: always
    volumes:
      - nextcloud_aio_mastercontainer:/mnt/docker-aio-config
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "${PORT_NEXTCLOUD_AIO:-8080}:8080"
    environment:
      - TZ=${TZ:-UTC}
      - AIO_DISABLE_BACKUP_SECTION=false
      - APACHE_PORT=11000
      - APACHE_IP_BINDING=${APACHE_IP_BINDING:-0.0.0.0}
      - BORG_RETENTION_POLICY=--keep-within=7d --keep-weekly=4 --keep-monthly=6
      - COLLABORA_SECCOMP_DISABLED=false
      - NEXTCLOUD_DATADIR=${NEXTCLOUD_DATADIR:-/mnt/nextcloud-data}
      - NEXTCLOUD_MOUNT=/mnt/
      - NEXTCLOUD_UPLOAD_LIMIT=${NEXTCLOUD_UPLOAD_LIMIT:-16G}
      - NEXTCLOUD_MAX_TIME=3600
      - NEXTCLOUD_MEMORY_LIMIT=${NEXTCLOUD_MEMORY_LIMIT:-512M}
      - NEXTCLOUD_STARTUP_APPS=${NEXTCLOUD_STARTUP_APPS:-deck twofactor_totp tasks calendar contacts notes}
      - NEXTCLOUD_ADDITIONAL_APKS=imagemagick
      - NEXTCLOUD_ADDITIONAL_PHP_EXTENSIONS=imagick
      - NEXTCLOUD_ENABLE_DRI_DEVICE=true
      - NEXTCLOUD_KEEP_DISABLED_APPS=false
      - SKIP_DOMAIN_VALIDATION=true
      - TALK_PORT=${TALK_PORT:-3478}
      - WATCHTOWER_DOCKER_SOCKET_PATH=/var/run/docker.sock
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/api/docker/getwelcome || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

volumes:
  nextcloud_aio_mastercontainer:
    name: nextcloud_aio_mastercontainer
