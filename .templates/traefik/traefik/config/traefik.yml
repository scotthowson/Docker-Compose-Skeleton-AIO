# =============================================================================
# Traefik Static Configuration
# =============================================================================
# Main Traefik configuration — deployed by Docker Compose Skeleton.
# Template variables (${TRAEFIK_DOMAIN:-example.com}, etc.) are substituted at deploy time.
# Documentation: https://doc.traefik.io/traefik/
# =============================================================================

global:
  checkNewVersion: true
  sendAnonymousUsage: false

serversTransport:
  insecureSkipVerify: true

# -----------------------------------------------------------------------------
# Entry Points
# -----------------------------------------------------------------------------
entryPoints:
  web:
    address: ':80'
    forwardedHeaders:
      trustedIPs: &trustedIps
        # Cloudflare IPv4
        - 173.245.48.0/20
        - 103.21.244.0/22
        - 103.22.200.0/22
        - 103.31.4.0/22
        - 141.101.64.0/18
        - 108.162.192.0/18
        - 190.93.240.0/20
        - 188.114.96.0/20
        - 197.234.240.0/22
        - 198.41.128.0/17
        - 162.158.0.0/15
        - 104.16.0.0/13
        - 104.24.0.0/14
        - 172.64.0.0/13
        - 131.0.72.0/22
        # Cloudflare IPv6
        - '2400:cb00::/32'
        - '2606:4700::/32'
        - '2803:f800::/32'
        - '2405:b500::/32'
        - '2405:8100::/32'
        - '2a06:98c0::/29'
        - '2c0f:f248::/32'
        # Local network
        - ${TRAEFIK_TRUSTED_LAN:-192.168.1.0/24}
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https

  websecure:
    address: ':443'
    forwardedHeaders:
      trustedIPs: *trustedIps
    http:
      tls:
        certResolver: letsencrypt
        domains:
          - main: ${TRAEFIK_DOMAIN:-example.com}
            sans:
              - '*.${TRAEFIK_DOMAIN:-example.com}'

# -----------------------------------------------------------------------------
# Plugins (optional — uncomment to enable)
