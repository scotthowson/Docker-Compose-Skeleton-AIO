# -----------------------------------------------------------------------------
# Providers
# -----------------------------------------------------------------------------
providers:
  providersThrottleDuration: 2s

  # File provider — reads route configs from custom_routes/ directory
  # Each stack category has its own subdirectory matching DOCKER_STACKS
  file:
    directory: /etc/traefik/custom_routes
    watch: true

  # Docker provider — auto-discovers containers via Docker Socket Proxy
  docker:
    watch: true
    network: proxy
    defaultRule: 'Host(`{{ lower (trimPrefix `/` .Name )}}.${TRAEFIK_DOMAIN:-example.com}`)'
    exposedByDefault: false
    endpoint: 'tcp://Docker-Socket:2375'

# -----------------------------------------------------------------------------
# Dashboard
# -----------------------------------------------------------------------------
api:
  dashboard: true
  insecure: true

ping:
  entryPoint: "traefik"

# -----------------------------------------------------------------------------
# Logging
# -----------------------------------------------------------------------------
log:
  level: INFO

# -----------------------------------------------------------------------------
# Certificate Resolvers
# -----------------------------------------------------------------------------
certificatesResolvers:
  letsencrypt:
    acme:
      email: ${TRAEFIK_ACME_EMAIL:-admin@example.com}
      storage: /etc/traefik/acme.json
      # DNS challenge via Cloudflare (recommended for wildcard certs)
      dnsChallenge:
        provider: cloudflare
        resolvers:
          - '1.1.1.1:53'
          - '1.0.0.1:53'
      # HTTP challenge alternative (uncomment and remove dnsChallenge above)
      # httpChallenge:
      #   entryPoint: web
