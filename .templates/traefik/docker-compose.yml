services:
  docker-socket-proxy:
    container_name: Docker-Socket
    image: tecnativa/docker-socket-proxy:latest
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - CONTAINERS=1
      - SERVICES=1
      - TASKS=1
      - EXEC=1
      - EVENTS=1
      - INFO=1
      - NETWORKS=1
      - VOLUMES=1
      - POST=0
    ports:
      - "2375:2375"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:2375/version"]
      interval: 30s
      timeout: 5s
      retries: 3

  traefik:
    container_name: Traefik
    image: traefik:v3
    restart: unless-stopped
    ports:
      - "${TRAEFIK_PORT_HTTP:-80}:80"
      - "${TRAEFIK_PORT_HTTPS:-443}:443"
      - "${TRAEFIK_PORT_DASHBOARD:-8080}:8080"
    volumes:
      - ${APP_DATA_DIR:-./App-Data}/Traefik:/etc/traefik
      - ${APP_DATA_DIR:-./App-Data}/Traefik/cache:/etc/traefik/cache
      - ${APP_DATA_DIR:-./App-Data}/Traefik/custom_routes:/etc/traefik/custom_routes
      - ${APP_DATA_DIR:-./App-Data}/Traefik/traefik.yml:/etc/traefik/traefik.yml
      - ${APP_DATA_DIR:-./App-Data}/Traefik/acme.json:/etc/traefik/acme.json
    environment:
      - TZ=${TZ:-UTC}
      - DOCKER_HOST=tcp://Docker-Socket:2375
      - CF_DNS_API_TOKEN=${CF_DNS_API_TOKEN:-}
    networks:
      - default
      - proxy
    labels:
      - traefik.enable=true
    depends_on:
      docker-socket-proxy:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "traefik", "healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

networks:
  proxy:
    name: proxy
    driver: bridge
