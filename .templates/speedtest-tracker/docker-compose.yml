services:
  speedtest-tracker:
    container_name: SpeedTest
    image: henrywhitaker3/speedtest-tracker
    restart: unless-stopped
    environment:
      - TZ=${TZ:-UTC}
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - OOKLA_EULA_GDPR=true
    ports:
      - "${HOST_PORT:-8765}:80"
    volumes:
      - ${APP_DATA_DIR:-./App-Data}/SpeedTest/config:/config
    logging:
      driver: json-file
      options:
        max-file: "10"
        max-size: "200k"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:80/ || exit 1"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 15s
