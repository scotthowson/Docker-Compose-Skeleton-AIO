services:
  ollama:
    container_name: Ollama
    image: ollama/ollama:latest
    restart: unless-stopped
    environment:
      - TZ=${TZ:-UTC}
    volumes:
      - ${APP_DATA_DIR:-./App-Data}/Ollama/data:/root/.ollama
    # Uncomment for NVIDIA GPU support:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-fso", "/dev/null", "http://127.0.0.1:11434/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  open-webui:
    container_name: Open-WebUI
    image: ghcr.io/open-webui/open-webui:main
    restart: unless-stopped
    environment:
      - TZ=${TZ:-UTC}
      - OLLAMA_BASE_URL=http://ollama:11434
      - WEBUI_SECRET_KEY=
    volumes:
      - ${APP_DATA_DIR:-./App-Data}/Open-WebUI/data:/app/backend/data
    ports:
      - "${PORT_OPEN_WEBUI:-3100}:8080"
    depends_on:
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fso", "/dev/null", "http://127.0.0.1:8080/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
