services:
  wizarr:
    container_name: Wizarr
    image: ghcr.io/wizarrrr/wizarr:latest
    restart: unless-stopped
    environment:
      - TZ=${TZ:-UTC}
      - APP_URL=http://localhost:${PORT_WIZARR:-5690}
    volumes:
      - ${APP_DATA_DIR:-./App-Data}/Wizarr/data:/data/database
    ports:
      - "${PORT_WIZARR:-5690}:5690"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:5690/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
