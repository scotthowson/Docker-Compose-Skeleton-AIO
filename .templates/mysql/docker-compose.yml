services:
  mysql:
    container_name: MySQL
    image: mysql:8.4
    environment:
      - TZ=${TZ:-UTC}
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-changeme}
      - MYSQL_DATABASE=${MYSQL_DATABASE:-app}
      - MYSQL_USER=${MYSQL_USER:-}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-}
    volumes:
      - ${APP_DATA_DIR:-./App-Data}/MySQL/data:/var/lib/mysql
      - ${APP_DATA_DIR:-./App-Data}/MySQL/init:/docker-entrypoint-initdb.d
    ports:
      - "${HOST_PORT:-3306}:3306"
    restart: unless-stopped
    mem_limit: 4G
    cpus: 4
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
