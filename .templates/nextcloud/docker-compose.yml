services:
  nextcloud:
    image: nextcloud:29.0.10-apache
    container_name: nextcloud
    restart: unless-stopped
    environment:
      - TZ=${TZ:-UTC}
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
    ports:
      - "${HOST_PORT}:80"
    volumes:
      - ${APP_DATA_DIR:-./App-Data}/Nextcloud/html:/var/www/html
      - ${APP_DATA_DIR:-./App-Data}/Nextcloud/data:/var/www/html/data
      - ${APP_DATA_DIR:-./App-Data}/Nextcloud/config:/var/www/html/config
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:80/status.php || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
