services:
  mongodb:
    image: mongo:7
    container_name: mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DB}
      TZ: ${TZ:-UTC}
    ports:
      - "${HOST_PORT}:27017"
    volumes:
      - ${APP_DATA_DIR:-./App-Data}/MongoDB/data:/data/db
      - ${APP_DATA_DIR:-./App-Data}/MongoDB/config:/data/configdb
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
