services:
  vaultwarden:
    container_name: Vaultwarden
    image: vaultwarden/server:latest
    restart: unless-stopped
    environment:
      - TZ=${TZ:-UTC}
      - DOMAIN=${VAULTWARDEN_DOMAIN:-https://vault.example.com}
      - SIGNUPS_ALLOWED=true
      - WEBSOCKET_ENABLED=true
    volumes:
      - ${APP_DATA_DIR:-./App-Data}/Vaultwarden/data:/data
    ports:
      - "${PORT_VAULTWARDEN:-8222}:80"
    healthcheck:
      test: ["CMD", "curl", "-fso", "/dev/null", "http://127.0.0.1:80/alive"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
