services:
  yacht:
    container_name: Yacht
    image: selfhostedpro/yacht:latest
    restart: unless-stopped
    environment:
      - TZ=${TZ:-UTC}
    volumes:
      - ${APP_DATA_DIR:-./App-Data}/Yacht/config:/config
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "${PORT_YACHT:-8000}:8000"
    healthcheck:
      test: ["CMD", "curl", "-fso", "/dev/null", "http://127.0.0.1:8000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
