services:
  caddy:
    image: caddy:2.8.4-alpine
    container_name: caddy
    restart: unless-stopped
    environment:
      - TZ=${TZ:-UTC}
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
    ports:
      - "${HOST_PORT}:80"
      - "${HTTPS_PORT}:443"
      - "${HTTPS_PORT}:443/udp"
    volumes:
      - ${APP_DATA_DIR:-./App-Data}/Caddy/data:/data
      - ${APP_DATA_DIR:-./App-Data}/Caddy/config:/config
      - ${APP_DATA_DIR:-./App-Data}/Caddy/site:/srv
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:80/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
