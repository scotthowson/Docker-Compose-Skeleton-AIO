services:
  komodo:
    container_name: Komodo
    image: ghcr.io/mbecker20/komodo:latest
    restart: unless-stopped
    environment:
      - TZ=${TZ:-UTC}
      - KOMODO_DATABASE_URI=sqlite:///data/komodo.db
    volumes:
      - ${APP_DATA_DIR:-./App-Data}/Komodo/data:/data
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "${PORT_KOMODO:-9120}:9120"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:9120/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
