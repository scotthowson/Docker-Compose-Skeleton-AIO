services:
  bookstack:
    container_name: BookStack
    image: lscr.io/linuxserver/bookstack:latest
    restart: unless-stopped
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-UTC}
      - APP_URL=http://127.0.0.1:${PORT_BOOKSTACK:-6875}
      - DB_HOST=bookstack-db
      - DB_PORT=3306
      - DB_USER=bookstack
      - DB_PASS=bookstack
      - DB_DATABASE=bookstackapp
    volumes:
      - ${APP_DATA_DIR:-./App-Data}/BookStack/config:/config
    ports:
      - "${PORT_BOOKSTACK:-6875}:80"
    depends_on:
      bookstack-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fso", "/dev/null", "http://127.0.0.1:80/status"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
  bookstack-db:
    container_name: BookStack-DB
    image: mariadb:11
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=bookstack
      - MYSQL_DATABASE=bookstackapp
      - MYSQL_USER=bookstack
      - MYSQL_PASSWORD=bookstack
    volumes:
      - ${APP_DATA_DIR:-./App-Data}/BookStack/db:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
