services:
  adguard-home:
    container_name: AdGuard-Home
    image: adguard/adguardhome:latest
    restart: unless-stopped
    environment:
      - TZ=${TZ:-UTC}
    volumes:
      - ${APP_DATA_DIR:-./App-Data}/AdGuard/work:/opt/adguardhome/work
      - ${APP_DATA_DIR:-./App-Data}/AdGuard/conf:/opt/adguardhome/conf
    ports:
      - "53:53/tcp"
      - "53:53/udp"
      - "${PORT_ADGUARD_WEB:-3080}:3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
