services:
  linkwarden:
    container_name: Linkwarden
    image: ghcr.io/linkwarden/linkwarden:latest
    restart: unless-stopped
    environment:
      - TZ=${TZ:-UTC}
      - NEXTAUTH_SECRET=${LINKWARDEN_NEXTAUTH_SECRET}
      - NEXTAUTH_URL=http://localhost:${PORT_LINKWARDEN:-3020}/api/v1/auth
      - DATABASE_URL=postgresql://linkwarden:linkwarden@linkwarden-db:5432/linkwarden
    volumes:
      - ${APP_DATA_DIR:-./App-Data}/Linkwarden/data:/data/data
    ports:
      - "${PORT_LINKWARDEN:-3020}:3000"
    depends_on:
      linkwarden-db:
        condition: service_healthy

  linkwarden-db:
    container_name: Linkwarden-DB
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_DB=linkwarden
      - POSTGRES_USER=linkwarden
      - POSTGRES_PASSWORD=linkwarden
    volumes:
      - ${APP_DATA_DIR:-./App-Data}/Linkwarden/db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U linkwarden -d linkwarden"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
