services:
  wg-easy:
    container_name: WireGuard
    image: ghcr.io/wg-easy/wg-easy:latest
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.src_valid_mark=1
    environment:
      - TZ=${TZ:-UTC}
      - WG_HOST=${WG_HOST}
      - PASSWORD_HASH=${WG_PASSWORD_HASH}
      - LANG=en
    volumes:
      - ${APP_DATA_DIR:-./App-Data}/WireGuard/config:/etc/wireguard
    ports:
      - "51820:51820/udp"
      - "51821:51821/tcp"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:51821/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
