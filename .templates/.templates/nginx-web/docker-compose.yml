services:
  nginx:
    container_name: Nginx
    image: nginx:alpine
    restart: unless-stopped
    environment:
      - TZ=${TZ:-UTC}
    volumes:
      - ${APP_DATA_DIR:-./App-Data}/Nginx/html:/usr/share/nginx/html
      - ${APP_DATA_DIR:-./App-Data}/Nginx/conf.d:/etc/nginx/conf.d
    ports:
      - "${PORT_NGINX:-8080}:80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
