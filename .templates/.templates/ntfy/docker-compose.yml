services:
  ntfy:
    container_name: ntfy
    image: binwiederhier/ntfy:latest
    restart: unless-stopped
    command: serve
    environment:
      - TZ=${TZ:-UTC}
    volumes:
      - ${APP_DATA_DIR:-./App-Data}/ntfy/cache:/var/cache/ntfy
      - ${APP_DATA_DIR:-./App-Data}/ntfy/config:/etc/ntfy
    ports:
      - "${PORT_NTFY:-8093}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --tries=1 http://127.0.0.1:80/v1/health -O - | grep -Eo '\"healthy\"\\s*:\\s*true' || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
