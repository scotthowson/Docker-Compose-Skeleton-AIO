services:
  transmission:
    container_name: Transmission
    image: lscr.io/linuxserver/transmission:latest
    restart: unless-stopped
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-UTC}
    volumes:
      - ${APP_DATA_DIR:-./App-Data}/Transmission/config:/config
      - ${APP_DATA_DIR:-./App-Data}/Transmission/downloads:/downloads
      - ${APP_DATA_DIR:-./App-Data}/Transmission/watch:/watch
    ports:
      - "${PORT_TRANSMISSION:-9091}:9091"
      - "51413:51413"
      - "51413:51413/udp"
    healthcheck:
      test: ["CMD", "curl", "-fso", "/dev/null", "http://127.0.0.1:9091/transmission/web/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
