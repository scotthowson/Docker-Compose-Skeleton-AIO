services:
  redisinsight:
    container_name: RedisInsight
    image: redis/redisinsight:latest
    restart: unless-stopped
    environment:
      - TZ=${TZ:-UTC}
    ports:
      - "${HOST_PORT:-5540}:5540"
    volumes:
      - ${APP_DATA_DIR:-./App-Data}/RedisInsight/data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:5540/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
