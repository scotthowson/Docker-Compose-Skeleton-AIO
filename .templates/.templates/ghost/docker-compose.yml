services:
  ghost:
    container_name: Ghost
    image: ghost:5-alpine
    restart: unless-stopped
    environment:
      - TZ=${TZ:-UTC}
      - url=${GHOST_URL:-http://localhost:2368}
      - database__client=sqlite3
      - database__connection__filename=/var/lib/ghost/content/data/ghost.db
    volumes:
      - ${APP_DATA_DIR:-./App-Data}/Ghost/content:/var/lib/ghost/content
    ports:
      - "${PORT_GHOST:-2368}:2368"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:2368/ghost/api/v4/admin/site/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
