services:
  authelia:
    container_name: Authelia
    image: authelia/authelia:latest
    restart: unless-stopped
    environment:
      - TZ=${TZ:-UTC}
    volumes:
      - ${APP_DATA_DIR:-./App-Data}/Authelia/config:/config:z
    ports:
      - "${HOST_PORT:-9091}:9091"
    expose:
      - 9091
    networks:
      - default
      - proxy
    depends_on:
      authelia-redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:9091/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  authelia-redis:
    container_name: Authelia-Redis
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - ${APP_DATA_DIR:-./App-Data}/Authelia/redis:/data:z
    expose:
      - 6379
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

networks:
  proxy:
    name: proxy
    external: true
