services:
  home-assistant:
    image: homeassistant/home-assistant:stable
    container_name: HomeAssistant
    restart: unless-stopped
    environment:
      - TZ=${TZ:-UTC}
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
    ports:
      - "${HOST_PORT}:8123"
    volumes:
      - ${APP_DATA_DIR:-./App-Data}/HomeAssistant/config:/config
      - /etc/localtime:/etc/localtime:ro
    mem_limit: 2G
    cpus: 2.0
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:8123/api/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
