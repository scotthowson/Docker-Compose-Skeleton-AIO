services:
  vikunja:
    container_name: Vikunja
    image: vikunja/vikunja:latest
    restart: unless-stopped
    environment:
      - TZ=${TZ:-UTC}
      - VIKUNJA_SERVICE_PUBLICURL=http://localhost:${PORT_VIKUNJA:-3456}
    volumes:
      - ${APP_DATA_DIR:-./App-Data}/Vikunja/files:/app/vikunja/files
      - ${APP_DATA_DIR:-./App-Data}/Vikunja/db:/db
    ports:
      - "${PORT_VIKUNJA:-3456}:3456"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3456/api/v1/info"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
