services:
  pgadmin:
    container_name: pgAdmin
    image: dpage/pgadmin4:latest
    restart: unless-stopped
    environment:
      - TZ=${TZ:-UTC}
      - PGADMIN_DEFAULT_EMAIL=${PGADMIN_EMAIL:-admin@example.com}
      - PGADMIN_DEFAULT_PASSWORD=admin
    volumes:
      - ${APP_DATA_DIR:-./App-Data}/pgAdmin/data:/var/lib/pgadmin
    ports:
      - "${PORT_PGADMIN:-5050}:80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:80/misc/ping"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
