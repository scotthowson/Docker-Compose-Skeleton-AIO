services:
  lidarr:
    container_name: Lidarr
    image: lscr.io/linuxserver/lidarr:latest
    restart: unless-stopped
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-UTC}
    volumes:
      - ${APP_DATA_DIR:-./App-Data}/Lidarr/config:/config
    ports:
      - "${PORT_LIDARR:-8686}:8686"
    healthcheck:
      test: ["CMD", "curl", "-fso", "/dev/null", "http://127.0.0.1:8686/ping"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
