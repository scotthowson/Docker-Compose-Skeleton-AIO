services:
  it-tools:
    container_name: IT-Tools
    image: corentinth/it-tools:latest
    restart: unless-stopped
    environment:
      - TZ=${TZ:-UTC}
    ports:
      - "${PORT_IT_TOOLS:-8092}:80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
