# Validate configuration settings
validate_settings() {
    local errors=()
    local warnings=()
    
    # Validate required directories
    [[ ! -d "$LOG_DIR" ]] && ! mkdir -p "$LOG_DIR" 2>/dev/null && errors+=("Cannot create log directory: $LOG_DIR")
    [[ ! -w "$LOG_DIR" ]] && errors+=("Log directory not writable: $LOG_DIR")
    
    # Validate log levels
    case "$LOG_LEVEL" in
        "ERROR"|"WARNING"|"INFO"|"DEBUG"|"VERBOSE") ;;
        *) warnings+=("Invalid LOG_LEVEL: $LOG_LEVEL, using INFO") && LOG_LEVEL="INFO" ;;
    esac
    
    # Validate numeric settings
    [[ ! "$LOG_MAX_SIZE" =~ ^[0-9]+[KMG]?$ ]] && warnings+=("Invalid LOG_MAX_SIZE: $LOG_MAX_SIZE")
    [[ ! "$LOG_BACKUP_COUNT" =~ ^[0-9]+$ ]] && warnings+=("Invalid LOG_BACKUP_COUNT: $LOG_BACKUP_COUNT")
    [[ ! "$SERVICE_START_DELAY" =~ ^[0-9]+$ ]] && warnings+=("Invalid SERVICE_START_DELAY: $SERVICE_START_DELAY")
    
    # Validate permissions
    [[ ! "$LOG_FILE_PERMISSIONS" =~ ^[0-7]{3}$ ]] && warnings+=("Invalid LOG_FILE_PERMISSIONS: $LOG_FILE_PERMISSIONS")
    [[ ! "$LOG_DIR_PERMISSIONS" =~ ^[0-7]{3}$ ]] && warnings+=("Invalid LOG_DIR_PERMISSIONS: $LOG_DIR_PERMISSIONS")
    
    # Validate URLs and hosts
    [[ -n "$NTFY_URL" ]] && ! [[ "$NTFY_URL" =~ ^https?:// ]] && warnings+=("NTFY_URL should start with http:// or https://")
    [[ -n "$WEBHOOK_URL" ]] && ! [[ "$WEBHOOK_URL" =~ ^https?:// ]] && warnings+=("WEBHOOK_URL should start with http:// or https://")
    
    # Report validation results
    if [[ ${#errors[@]} -gt 0 ]]; then
        echo "❌ Configuration errors found:" >&2
        printf "   - %s\n" "${errors[@]}" >&2
        return 1
    fi
    
    if [[ ${#warnings[@]} -gt 0 ]]; then
        echo "⚠️  Configuration warnings:" >&2
        printf "   - %s\n" "${warnings[@]}" >&2
    fi
    
    return 0
}

# Initialize settings and create required directories
initialize_settings() {
    # Create required directories
    local required_dirs=(
        "$LOG_DIR"
        "$LOG_BACKUP_DIR"
        "$(dirname "$ZIP_DIRECTORY")"
        "$(dirname "$EXTRACTION_DIRECTORY")"
    )
    
    for dir in "${required_dirs[@]}"; do
        [[ -n "$dir" ]] && [[ ! -d "$dir" ]] && mkdir -p "$dir" 2>/dev/null
    done
    
    # Set appropriate permissions
    [[ -d "$LOG_DIR" ]] && chmod "$LOG_DIR_PERMISSIONS" "$LOG_DIR" 2>/dev/null
    [[ -f "$LOG_FILE" ]] && chmod "$LOG_FILE_PERMISSIONS" "$LOG_FILE" 2>/dev/null
    
    # Initialize environment-specific settings
    case "${ENVIRONMENT:-production}" in
        "development"|"testing")
            # Create additional development directories
            [[ -n "${PROFILE_OUTPUT_DIR:-}" ]] && mkdir -p "$PROFILE_OUTPUT_DIR" 2>/dev/null
            ;;
    esac
    
    return 0
}

# Display current configuration
