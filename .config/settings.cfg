                local colors
                colors="$(tput colors 2>/dev/null || echo 0)"
                [[ "$colors" -ge 8 ]] && export ENABLE_COLORS=true || export ENABLE_COLORS=false
            else
                export ENABLE_COLORS=false
            fi
            ;;
    esac
}

