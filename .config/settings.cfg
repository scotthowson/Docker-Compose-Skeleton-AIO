# Logging Levels and Behavior
LOG_LEVEL="${LOG_LEVEL:-INFO}"                  # Default logging level (ERROR, WARNING, INFO, DEBUG, VERBOSE)
VERBOSE_MODE="${VERBOSE_MODE:-false}"           # Enable verbose logging mode
DEBUG_MODE="${DEBUG_MODE:-false}"               # Enable debug mode with additional context
QUIET_MODE="${QUIET_MODE:-false}"               # Suppress non-critical output

# Log level hierarchy validation
_validate_log_level() {
    local valid_levels=("ERROR" "WARNING" "INFO" "DEBUG" "VERBOSE")
    local level="$1"
    
    for valid in "${valid_levels[@]}"; do
        [[ "$level" == "$valid" ]] && return 0
    done
    
    echo "⚠️  Warning: Invalid log level '$level', defaulting to INFO" >&2
    LOG_LEVEL="INFO"
}

# Validate LOG_LEVEL on load
_validate_log_level "$LOG_LEVEL"

#===============================================================================
# FILE AND PATH CONFIGURATION
#===============================================================================

# Dynamic log file configuration with intelligent fallbacks
_configure_log_paths() {
    # Primary log file location
    if [[ -n "${BASE_DIR:-}" ]]; then
        LOG_FILE="${BASE_DIR}/logs/docker-services.log"
        LOG_DIR="${BASE_DIR}/logs"
    elif [[ -n "${COMPOSE_DIR:-}" ]]; then
        LOG_FILE="${COMPOSE_DIR}/docker-services.log"
        LOG_DIR="$(dirname "$LOG_FILE")"
    else
        # Fallback to system temp or user home
        if [[ -w "/var/log" ]]; then
            LOG_FILE="/var/log/docker-services.log"
            LOG_DIR="/var/log"
        else
            LOG_FILE="${HOME}/docker-services.log"
            LOG_DIR="$HOME"
        fi
    fi
    
    # Backup and archive configuration
    LOG_BACKUP_DIR="${LOG_DIR}/archive"
    LOG_MAX_SIZE="${LOG_MAX_SIZE:-10M}"          # Maximum log file size before rotation
    LOG_BACKUP_COUNT="${LOG_BACKUP_COUNT:-12}"   # Number of backup files to keep
    LOG_COMPRESS_BACKUPS="${LOG_COMPRESS_BACKUPS:-true}"  # Compress rotated logs
    LOG_RETENTION_DAYS="${LOG_RETENTION_DAYS:-90}"  # Days to keep log files (90 days = ~3 months)
    
    # Ensure log directory exists
    [[ ! -d "$LOG_DIR" ]] && mkdir -p "$LOG_DIR" 2>/dev/null
    [[ ! -d "$LOG_BACKUP_DIR" ]] && mkdir -p "$LOG_BACKUP_DIR" 2>/dev/null
}

# Configure paths
_configure_log_paths

# Export log-related paths
