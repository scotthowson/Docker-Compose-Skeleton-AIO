    echo "Log Level: $LOG_LEVEL"
    echo "Color Support: $ENABLE_COLORS"
    echo "Log File: $LOG_FILE"
    echo "Verbose Mode: $VERBOSE_MODE"
    echo "Debug Mode: $DEBUG_MODE"
    echo
    
    if [[ "$show_sensitive" == "true" ]] || [[ "$DEVELOPMENT_MODE" == "true" ]]; then
        echo "Detailed Configuration:"
        echo "----------------------"
        # Show all configuration variables (excluding sensitive ones unless explicitly requested)
        env | grep -E "^(LOG_|COLOR_|ENABLE_|APPLICATION_|SCRIPT_)" | sort
    fi
}

# Export essential settings for use by other scripts
export_settings() {
    # Export essential variables
    export APPLICATION_TITLE SCRIPT_VERSION ENVIRONMENT
    export LOG_LEVEL VERBOSE_MODE DEBUG_MODE QUIET_MODE
    export LOG_FILE LOG_DIR LOG_BACKUP_DIR
    export ENABLE_COLORS COLOR_THEME
    export DOCKER_TIMEOUT SERVICE_START_DELAY SERVICE_STOP_DELAY
    
    # Export Docker-specific settings
    export DOCKER_COMPOSE_VERSION MAX_PARALLEL_OPERATIONS
    export REMOVE_ORPHANED_CONTAINERS REMOVE_ANONYMOUS_VOLUMES
    
    # Export notification settings
    export ENABLE_NOTIFICATIONS NTFY_URL
}

#===============================================================================
# AUTOMATIC INITIALIZATION
#===============================================================================

# Auto-validate and initialize if not in quiet mode
if [[ "${SETTINGS_QUIET:-false}" != "true" ]]; then
    if ! validate_settings; then
        echo "❌ Settings validation failed. Please check your configuration." >&2
        return 1 2>/dev/null || exit 1
    fi

    initialize_settings
    export_settings
fi

# Mark settings as loaded
export SETTINGS_LOADED=true
export SETTINGS_VERSION="2.0"

# Optional: Display configuration in development mode
if [[ "$DEVELOPMENT_MODE" == "true" ]] && [[ "${SETTINGS_QUIET:-false}" != "true" ]]; then
    show_configuration false
fi

#===============================================================================
# BACKUP SYSTEM CONFIGURATION
#===============================================================================

# Backup Logging Configuration
BACKUP_LOG_FILE="${BACKUP_LOG_FILE:-${LOG_DIR}/backup.log}"
BACKUP_LOG_LEVEL="${BACKUP_LOG_LEVEL:-INFO}"
BACKUP_LOG_RETENTION="${BACKUP_LOG_RETENTION:-30}"         # Days to keep backup logs
ENABLE_BACKUP_NOTIFICATIONS="${ENABLE_BACKUP_NOTIFICATIONS:-true}"

# Backup Operation Settings
BACKUP_TIMEOUT="${BACKUP_TIMEOUT:-3600}"                   # 1 hour timeout for backup operations
BACKUP_INTEGRITY_CHECK="${BACKUP_INTEGRITY_CHECK:-true}"   # Verify backup integrity
BACKUP_PARALLEL_COMPRESSION="${BACKUP_PARALLEL_COMPRESSION:-false}"
BACKUP_RETENTION_COUNT="${BACKUP_RETENTION_COUNT:-6}"      # Number of backup files to keep